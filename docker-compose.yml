  #   command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2

  postgres:
    image: postgres:18.1-alpine3.23
    container_name: RateWatch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ratewatch
      POSTGRES_USER: ratewatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "ratewatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: RateWatch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redis_data:
